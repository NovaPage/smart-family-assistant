<div class="login-container">
  <div class="login-card">
    <img src="assets/logo.png" alt="Logo" class="login-logo" />
    <h2 class="login-title">SIGN IN</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label>
          <lucide-icon [img]="Mail" size="20" strokeWidth="1.5"></lucide-icon>
          <input type="text" formControlName="username" placeholder="Email address" />
        </label>
      </div>

      <div class="form-group">
        <label>
          <lucide-icon [img]="Lock" size="20" strokeWidth="1.5"></lucide-icon>
          <input [type]="passwordInputType" formControlName="password" placeholder="Password" />
          <lucide-icon
            [img]="showPassword ? Eye : EyeOff"
            size="20"
            strokeWidth="1.5"
            (click)="togglePasswordVisibility()"
            class="icon-eye"
          ></lucide-icon>
        </label>
      </div>

      <button type="submit" [disabled]="form.invalid || isLoading" class="login-button">
        <ng-container *ngIf="!isLoading; else loadingTpl">LOGIN</ng-container>
        <ng-template #loadingTpl>
          <lucide-icon [img]="Loader" class="spinner" size="20" strokeWidth="2"></lucide-icon>
        </ng-template>
      </button>

      <div *ngIf="error" class="error-message-box">
        <p class="error-message-text">{{ error }}</p>
      </div>
    </form>
  </div>

</div>
