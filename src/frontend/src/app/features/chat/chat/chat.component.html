<div class="chat-wrapper">
  <app-navbar></app-navbar>

  <div class="chat-container">
    <div class="chat-messages">
      <div class="chat-welcome">
        <div class="welcome-avatar"></div>
        <p class="welcome-text">Hi, {{ userName }}! 👋</p>
      </div>      
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.sender">
        <div class="message-avatar" [ngClass]="msg.sender === 'assistant' ? 'bot-avatar' : 'user-avatar'"></div>
        <div class="message-bubble">{{ msg.content }}</div>
      </div>      
    </div>

    <div class="chat-input-section">
      <input [(ngModel)]="inputMessage" placeholder="Feel free to express yourself" />
      <button (click)="sendMessage()" [disabled]="isLoading">
        <lucide-icon [img]="Send" size="18"></lucide-icon>
      </button>
    </div>

    <p *ngIf="isLoading" class="loading-text">Loading response...</p>
  </div>
</div>
